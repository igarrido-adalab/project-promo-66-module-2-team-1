<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Título</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./images/favicon.png" />
    <script
      src="https://kit.fontawesome.com/66349fc88a.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" crossorigin href="./assets/main-CUIwiy0U.css">
  </head>

  <body class="create">
    <header class="header">
  <img class="header__logo" src="./images/image.png" alt="Logo de Adalab" />
  <h1 class="title--big">Awesome profile cards</h1>
</header>

    <main class="page main">
      <!-- PREVIEW -->
<section class="preview fancy-border">
  <button class="preview__btn">
    <i class="far fa-trash-alt" aria-hidden="true"></i> Reset
  </button>
  <article class="preview__card fancy-border">
    <div class="preview__header">
      <h2 class="preview__name js_namePreview">Nombre Apellidos</h2>
      <h3 class="preview__job js_jobPreview">Front-end developer</h3>
    </div>
    <!-- <img
      class="preview__photo"
      src="./images/monigota.png"
      alt="Foto de la usuaria"
    /> -->
    <div class="preview__photo"></div>

    <nav>
      <a class="preview__icon js_phonePreview" href="#">
        <!-- title="" -->
        <i class="fas fa-phone"></i>
      </a>
      <a class="preview__icon js_emailPreview" href="#">
        <i class="far fa-envelope"></i>
      </a>
      <a class="preview__icon js_linkedinPreview" href="#">
        <i class="fab fa-linkedin-in"></i>
      </a>
      <a class="preview__icon js_githubPreview" href="#">
        <i class="fab fa-github-alt"></i>
      </a>
    </nav>
  </article>
</section>

      <form class="form">
  <ul class="breadcrumbs">
    <li>
      <button class="breadcrumbs__step--selected js_showDesignBtn">
        Diseña
      </button>
    </li>
    <li>
      <button class="breadcrumbs__step js_showFillBtn">Rellena</button>
    </li>
    <li>
      <button class="breadcrumbs__step js_showShareBtn">Comparte</button>
    </li>
  </ul>

  <fieldset class="form__box js_designSection">
    <label>Colores</label>
<ul class="form__paletteslist">
  <li class="first_palette">
    <label class="form__paletteItem" for="palette1">
      <input
        checked="true"
        id="palette1"
        type="radio"
        name="color_palette"
        class="input_palette"
        value="1"
      />
      Paleta 1
      <div class="colorOne form__paletteBox"></div>
      <div class="colorTwo form__paletteBox"></div>
      <div class="colorThree form__paletteBox"></div>
    </label>
  </li>

  <li class="second_palette">
    <label class="form__paletteItem" for="palette2">
      <input
        checked="false"
        id="palette2"
        type="radio"
        name="color_palette"
        class="input_palette"
        value="2"
      />
      Paleta 2
      <div class="colorOne form__paletteBox"></div>
      <div class="colorTwo form__paletteBox"></div>
      <div class="colorThree form__paletteBox"></div>
    </label>
  </li>

  <li class="third_palette">
    <label class="form__paletteItem" for="palette3">
      <input
        checked="false"
        id="palette3"
        type="radio"
        name="color_palette"
        class="input_palette"
        value="3"
      />
      Paleta 3
      <div class="colorOne form__paletteBox"></div>
      <div class="colorTwo form__paletteBox"></div>
      <div class="colorThree form__paletteBox"></div>
    </label>
  </li>
</ul>

  </fieldset>
  <fieldset class="form__box js_fillSection collapsed">
    <ul class="">
  <li class="form__item">
    <label for="name">Nombre completo</label>
    <input
      class="js_input"
      type="text"
      name="name"
      id="name"
      placeholder="Ej: Sally Jill"
    />
  </li>
  <li class="form__item">
    <label for="job">Puesto</label>
    <input
      class="js_input"
      type="text"
      name="job"
      id="job"
      placeholder="Ej: Front-end unicorn"
    />
  </li>

  <li class="form__item--photo fancy-border bdr-red">
    <label class="form__photolabel" for="photo">Imagen de perfil</label>
    <label for="photo" class="form__photobutton">Añadir imagen</label>

    <input class="hidden" id="photo" type="file" />

    <span class="form__photothumb"></span>
  </li>

  <li class="form__item">
    <label for="email">Email</label>
    <input
      class="js_input"
      type="text"
      name="email"
      id="email"
      placeholder="Ej. sally.hill@email.com"
    />
  </li>
  <li class="form__item">
    <label for="phone">Teléfono</label>
    <input
      class="js_input"
      type="text"
      name="phone"
      id="phone"
      placeholder="Ej. 555-55-55-55"
    />
  </li>
  <li class="form__item">
    <label for="linkedin">Linkedin</label>
    <input
      class="js_input"
      type="text"
      name="linkedin"
      id="linkedin"
      placeholder="Ej. linkedin.com/in/sally-hill"
    />
  </li>
  <li class="form__item">
    <label for="github">Github</label>
    <input
      class="js_input"
      type="text"
      name="github"
      id="github"
      placeholder="Ej. @Sally-Hill"
    />
  </li>
</ul>

  </fieldset>
  <fieldset class="form__box js_shareSection collapsed">
    <button class="form__button--create">
  <i class="far fa-address-card" aria-hidden="true"></i>
  Crear tarjeta
</button>

<div class="hidden">
  <p>Tu tarjeta ha sido creada.</p>
  <p>
    Puedes visitar la información en el siguiente enlace:
    <a class="" href=""></a>
  </p>
  <p>
    <a class="form__button--share" href=""
      ><i class="fa-brands fa-bluesky"></i> Compartir en Bluesky</a
    >
  </p>
</div>

<div class="hidden">
  No se pudo crar la tarjeta porque faltan datos por rellenar.
</div>

  </fieldset>
</form>

    </main>
    <footer class="footer">
  Awesome profile cards &#x1F952; &copy;2026 Promo Ana Freire
  <img class="footer__logo" src="./images/logo-adalab.png" alt="Logo Adalab" />
</footer>

    <script src="./js/main.js"></script>
  </body>
</html>
